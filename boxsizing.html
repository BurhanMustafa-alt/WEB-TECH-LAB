<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
</head>
<style>
    .div1{
        width: 200px;
        height: 100px;
        border: 10px solid black;
        margin: auto;
        text-align: center;
        align-content: center;
        padding: 50px;
    }
    .div2{
         width: 200px;
        height: 100px;
        border: 2px solid red;
        margin: auto;
        margin-top: 20px;
        text-align: center;
        align-content: center;
    }
    *{
        box-sizing: border-box;
    }
</style>
<body>
    <h2 style="text-align: center;">Learning about box sizing</h2>
    <div class="div1">A</div>
    <div class="div2">B</div>
    
</body>
</html>
